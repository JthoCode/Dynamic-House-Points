<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Password</title>
    <link rel="stylesheet" href="/static/styles.css" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
  </head>
  <body>
    <h1>House Overlord's Home</h1>
    <!-- Brother (or sister), you think I'm going to store a password in plain HTML? -->
    <!--Nah, I'm good-->
    <form
      method="post"
      action="/password"
      class="p-4"
      style="max-width: 600px; margin: 20px auto"
      name="password-form"
    >
      <div class="mb-3">
        <label for="password" class="form-label">Enter Admin Password</label>
        <input
          type="password"
          class="form-control"
          id="password"
          name="password"
          placeholder="Password"
        />
      </div>
      <button type="submit" class="btn btn-primary" id="password-submit">
        Enter
      </button>
    </form>
  </body>
</html>
